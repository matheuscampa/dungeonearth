<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCC RPG — Entrar</title>
<style>
  :root{
    --bg:#0c0e13; --panel:#15181f; --panel2:#1c212b; --line:#2a313d;
    --txt:#e7e9ee; --dim:#9aa0a6; --accent:#ff7a18; --accent2:#ffd166;
    --err:#ff6b6b; --ok:#4caf50;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% -10%,#1a1f2b 0,var(--bg) 60%);
    color:var(--txt);font-family:"Segoe UI",system-ui,Arial,sans-serif;padding:20px}
  .card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:28px 26px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  h1{margin:0 0 2px;font-size:22px;color:var(--accent2);letter-spacing:.3px;text-align:center}
  .sub{color:var(--dim);font-size:12.5px;text-align:center;margin-bottom:22px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:14px 0 6px}
  input[type=email],input[type=password],input[type=text]{
    width:100%;background:var(--panel2);border:1px solid var(--line);color:#fff;
    border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  button{width:100%;font-family:inherit;cursor:pointer;border:1px solid var(--line);
    background:var(--accent);color:#1a1005;font-weight:800;padding:11px;border-radius:9px;
    font-size:14px;margin-top:20px;transition:.15s}
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.5;cursor:default}
  .ghost{background:transparent;color:var(--txt);border:1px solid var(--line);font-weight:600;margin-top:9px}
  .ghost:hover{border-color:var(--accent);color:#fff}
  .linkrow{text-align:center;margin-top:16px;font-size:12.5px;color:var(--dim)}
  .linkrow a{color:var(--accent2);text-decoration:none;cursor:pointer}
  .linkrow a:hover{text-decoration:underline}
  .msg{margin-top:14px;font-size:12.5px;border-radius:8px;padding:9px 11px;display:none}
  .msg.err{display:block;background:#2a1414;border:1px solid #4a2020;color:var(--err)}
  .msg.ok{display:block;background:#12241a;border:1px solid #234a30;color:#8fe0a8}
  .logo{text-align:center;font-size:34px;margin-bottom:2px}
  .forgot{display:block;text-align:right;font-size:11.5px;color:var(--dim);margin-top:6px;cursor:pointer;text-decoration:none}
  .forgot:hover{color:var(--accent2)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎲</div>
  <h1>Dungeon Crawler Carl</h1>
  <div class="sub" id="modeSub">Entre com seu email e senha para acessar suas mesas</div>

  <div id="msgBox" class="msg"></div>

  <form id="authForm">
    <label>Seu nome (só no cadastro)</label>
    <input type="text" id="fName" placeholder="Como te chamam na mesa" autocomplete="name" style="display:none">

    <label>Email</label>
    <input type="email" id="fEmail" placeholder="voce@email.com" autocomplete="email" required>

    <label>Senha</label>
    <input type="password" id="fPass" placeholder="mínimo 6 caracteres" autocomplete="current-password" required>
    <a class="forgot" id="forgotLink" onclick="resetPass()">esqueci minha senha</a>

    <button type="submit" id="mainBtn">Entrar</button>
    <button type="button" class="ghost" id="toggleBtn" onclick="toggleMode()">Ainda não tenho conta — criar agora</button>
  </form>

  <div class="linkrow">Dungeon Crawler Carl RPG · portal de mesas</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// Mesmo projeto Firebase já usado pelo Dashboard/Painel do Mestre (dungeonearth).
const DEFAULT_FB_CFG={apiKey:"AIzaSyCWfU58HVTvLK4ej5yDH06mr2CQtxsde-8",authDomain:"dungeonearth.firebaseapp.com",databaseURL:"https://dungeonearth-default-rtdb.firebaseio.com",projectId:"dungeonearth",storageBucket:"dungeonearth.firebasestorage.app",messagingSenderId:"528605528507",appId:"1:528605528507:web:8bf62f719a9e773607449e",measurementId:"G-6C91MQ4W56"};
const fbApp = firebase.initializeApp(DEFAULT_FB_CFG);
const auth = firebase.auth();
const db = firebase.database();

let mode='login'; // 'login' | 'signup'

function showMsg(text, kind){
  const b=document.getElementById('msgBox');
  b.textContent=text; b.className='msg '+(kind||'err');
}
function clearMsg(){const b=document.getElementById('msgBox'); b.className='msg'; b.textContent='';}

function toggleMode(){
  mode = (mode==='login') ? 'signup' : 'login';
  const isSignup = mode==='signup';
  document.getElementById('fName').style.display = isSignup ? 'block' : 'none';
  document.getElementById('fName').previousElementSibling.style.display = isSignup ? 'block' : 'none';
  document.getElementById('modeSub').textContent = isSignup
    ? 'Crie sua conta para entrar nas mesas ou criar a sua'
    : 'Entre com seu email e senha para acessar suas mesas';
  document.getElementById('mainBtn').textContent = isSignup ? 'Criar conta' : 'Entrar';
  document.getElementById('toggleBtn').textContent = isSignup
    ? 'Já tenho conta — entrar'
    : 'Ainda não tenho conta — criar agora';
  document.getElementById('forgotLink').style.display = isSignup ? 'none' : 'block';
  clearMsg();
}

function friendlyError(code){
  const map={
    'auth/invalid-email':'Email inválido.',
    'auth/missing-password':'Digite uma senha.',
    'auth/weak-password':'A senha precisa ter pelo menos 6 caracteres.',
    'auth/email-already-in-use':'Já existe uma conta com esse email — tente entrar em vez de criar.',
    'auth/invalid-credential':'Email ou senha incorretos.',
    'auth/wrong-password':'Email ou senha incorretos.',
    'auth/user-not-found':'Não existe conta com esse email — crie uma primeiro.',
    'auth/too-many-requests':'Muitas tentativas. Espere um pouco e tente de novo.'
  };
  return map[code] || ('Erro: '+code);
}

document.getElementById('authForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  clearMsg();
  const email=document.getElementById('fEmail').value.trim();
  const pass=document.getElementById('fPass').value;
  const name=document.getElementById('fName').value.trim();
  const btn=document.getElementById('mainBtn');
  btn.disabled=true;
  try{
    if(mode==='signup'){
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      const displayName = name || email.split('@')[0];
      await cred.user.updateProfile({displayName});
      await db.ref('usuarios/'+cred.user.uid+'/perfil').set({
        email, nome: displayName, criadoEm: firebase.database.ServerValue.TIMESTAMP
      });
    } else {
      await auth.signInWithEmailAndPassword(email, pass);
    }
    showMsg('Tudo certo! Entrando…','ok');
    location.href='DCC-Portal.html';
  }catch(err){
    showMsg(friendlyError(err.code), 'err');
  }finally{
    btn.disabled=false;
  }
});

function resetPass(){
  const email=document.getElementById('fEmail').value.trim();
  if(!email){ showMsg('Digite seu email no campo acima primeiro.','err'); return; }
  auth.sendPasswordResetEmail(email)
    .then(()=>showMsg('Enviamos um link de redefinição para '+email+'.','ok'))
    .catch(err=>showMsg(friendlyError(err.code),'err'));
}

// Se já estiver logado, pula direto pro portal.
auth.onAuthStateChanged(user=>{
  if(user) location.href='DCC-Portal.html';
});
</script>
</body>
</html>
