<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCC RPG — Painel do Mestre (ao vivo)</title>
<style>
  :root{
    --bg:#0c0e13; --panel:#15181f; --panel2:#1c212b; --line:#2a313d;
    --txt:#e7e9ee; --dim:#9aa0a6; --accent:#ff7a18; --accent2:#ffd166;
    --r-comum:#9aa0a6; --r-incomum:#4caf50; --r-raro:#2f8fff;
    --r-epico:#b14cff; --r-lendario:#ff9800; --r-celestial:#dfefff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(circle at 50% -10%,#1a1f2b 0,var(--bg) 60%);
    color:var(--txt);font-family:"Segoe UI",system-ui,Arial,sans-serif;padding:18px 14px 60px}
  .wrap{max-width:1320px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  h1{margin:0;font-size:21px;color:var(--accent2);letter-spacing:.3px}
  header small{color:var(--dim);font-size:12px}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);padding:7px 11px;border-radius:8px;font-size:12px;transition:.15s}
  button:hover{border-color:var(--accent);color:#fff}
  button.sm{padding:5px 9px}
  .catbar{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .catbar .status{font-size:12px;color:var(--dim)}
  .catbar input[type=text]{background:var(--panel2);border:1px solid var(--line);color:#fff;border-radius:7px;padding:7px 10px;font-size:12px}
  .catbar textarea{flex:1;min-width:240px;background:var(--panel2);border:1px solid var(--line);color:#fff;
    border-radius:7px;padding:8px;font-size:11px;font-family:monospace;min-height:96px}

  .players{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .phead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:10px}
  .pname{font-size:17px;font-weight:800}
  .plvl{font-size:11px;color:var(--accent2);white-space:nowrap}
  .pstats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
  .ps{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:6px;text-align:center}
  .ps .k{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .ps .v{font-size:16px;font-weight:800}
  .ps.def .v{color:var(--accent2)}
  .pattrs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .pa{font-size:11px;background:#11141a;border:1px solid var(--line);border-radius:6px;padding:3px 7px}
  .pa b{color:#fff}
  .eq-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:4px 0 7px}
  .eqlist{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .eq{border-left:3px solid var(--line);background:var(--panel2);border-radius:6px;padding:6px 8px}
  .eq .slot{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .eq .nm{font-size:11px;font-weight:700;line-height:1.2}
  .eq .st{font-size:9px;color:var(--dim);margin-top:2px}
  .eq .st .dmg{color:var(--accent2)} .eq .st .def{color:#7fd1ff}
  .empty-eq{grid-column:1/-1;color:var(--dim);font-size:11px;font-style:italic}
  .invtags{display:flex;flex-wrap:wrap;gap:5px}
  .invtag{font-size:10px;padding:2px 7px;border:1px solid var(--line);border-left-width:3px;border-radius:5px;background:var(--panel2)}
  .restline{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
  .goldtag{font-size:12px;font-weight:800;color:var(--accent2);background:#11141a;border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .boxtag{font-size:10px;font-weight:700;border:1px solid;border-radius:6px;padding:2px 7px;background:#11141a}
  .stale{opacity:.55}
  .updated{font-size:9px;color:var(--dim);margin-top:10px;text-align:right}
  .nobody{color:var(--dim);text-align:center;padding:50px;font-size:14px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:5px}
  .dot.live{background:var(--r-incomum);box-shadow:0 0 8px var(--r-incomum)}
  .una{background:#231a14;border:1px solid #4a3826;border-radius:7px;padding:5px 9px;font-size:10.5px;color:#ffcf9a;margin-bottom:10px}
  .una b{color:#ff9d5c}
  .sklist{display:flex;flex-direction:column;gap:2px}
  .skrow{font-size:10.5px;display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .skrow .nm{padding-left:6px}
  .skrow .rk{color:var(--accent2);font-weight:700;white-space:nowrap;font-size:9.5px}
  .pstag{font-size:10px;font-weight:700;color:#c9a3ff;background:#11141a;border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .patag{font-size:10px;font-weight:700;color:#ffd166;background:#11141a;border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .compan-wrap{display:flex;flex-direction:column;gap:4px}
  .compan-row{display:flex;gap:8px;align-items:baseline;font-size:10.5px;border-left:3px solid #4caf50;padding-left:6px;flex-wrap:wrap}
  .compan-row .cnm{font-weight:700}
  .compan-row .chpc{color:#ff8a8a;white-space:nowrap}
  .compan-row .cnt{color:var(--dim)}
  /* trackers do mestre */
  .gmbar{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .gmbox{display:flex;align-items:center;gap:8px}
  .gmbox .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
  .gmbox input{background:var(--panel2);border:1px solid var(--line);color:#fff;border-radius:6px;padding:5px 7px;font-size:13px;width:64px;text-align:center}
  .gmbox .xpbar{width:160px;height:10px;background:#11141a;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .gmbox .xpfill{height:100%;background:linear-gradient(90deg,#4caf50,#ffcf3f)}
  .gmbox button{padding:4px 9px;font-size:13px}
  .colpips{display:flex;gap:4px}
  .colpip{width:16px;height:16px;border-radius:4px;border:1px solid var(--line);background:#11141a;cursor:pointer}
  .colpip.on{background:#ff5d5d;border-color:#ff5d5d}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1>👁 PAINEL DO MESTRE</h1><small>Dungeon Crawler Carl — fichas dos crawlers ao vivo</small></div>
    <div style="display:flex;gap:8px">
      <button class="sm" onclick="exportBackup()" title="Baixar um snapshot de todas as fichas para guardar no projeto">⬇ Backup das fichas</button>
      <button class="sm" onclick="toggleCfg()">⚙ Configurar Firebase</button>
    </div>
  </header>

  <div class="catbar">
    <span class="status"><span class="dot" id="dot"></span><span id="status">Desconectado</span></span>
    <input type="text" id="roomCode" placeholder="Código da mesa (o mesmo dos jogadores)">
    <button class="sm" onclick="connectCloud()">📡 Conectar mesa</button>
  </div>
  <div class="catbar" id="cfgbar" style="display:none">
    <textarea id="fbCfg" placeholder="Cole aqui o objeto firebaseConfig do seu projeto…"></textarea>
    <button class="sm" onclick="saveCfg()">Salvar config</button>
  </div>

  <div class="gmbar">
    <div class="gmbox"><span class="lbl">Colapso do andar</span><div class="colpips" id="gmColapso"></div></div>
    <div class="gmbox"><span class="lbl" style="color:var(--dim)">XP é individual — controle pelo card de cada jogador (campo XP).</span></div>
  </div>

  <div class="players" id="players"><div class="nobody">Conecte-se a uma mesa para ver os crawlers.</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
let lastData={};
function exportBackup(){
  const room=(localStorage.getItem('dcc_mestre_room')||'mesa');
  const payload={mesa:room, exportadoEm:new Date().toISOString(), jogadores:lastData||{}};
  const n=Object.keys(lastData||{}).length;
  if(!n && !confirm('Nenhuma ficha carregada ainda. Baixar backup vazio mesmo assim?'))return;
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='DCC-Fichas-'+room+'-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
const RAR={comum:'var(--r-comum)',incomum:'var(--r-incomum)',raro:'var(--r-raro)',epico:'var(--r-epico)',lendario:'var(--r-lendario)',celestial:'var(--r-celestial)'};
const TRACK={FOR:'#ff5d5d',DEX:'#4caf50',INT:'#2f8fff',CHA:'#ffcf3f',NEU:'#b9c0cc'};
function unarmedCalc(at,cards){
  const FOR=+at.FOR||1,DEX=+at.DEX||1,reg=FOR>=DEX?'FOR':'DEX',rv=Math.max(FOR,DEX);
  let ubd=0,ubp=0;Object.values(cards||{}).forEach(c=>{ubd+=(+c.ubd||0);ubp+=(+c.ubp||0);});
  const m=rv/5,b=[1,2,4].map(x=>Math.max(1,Math.floor((x+ubd)*m)));
  return {reg,b,prec:isqrt(rv)+ubp,mult:(Math.round(m*100)/100).toString().replace('.',',')};
}
function psSpentCalc(sks){return (sks||[]).reduce((a,s)=>{let r=s.rank||1,t=1;for(let k=2;k<=r;k++)t+=(k<=5?1:k<=10?2:4);return a+t;},0);}
function skillsHTML(sks){
  if(!sks||!sks.length)return '<div class="empty-eq">Nenhuma skill.</div>';
  return '<div class="sklist">'+sks.map(s=>{
    const cor=TRACK[s.track]||TRACK.NEU;
    const cost=s.passiva?'Passiva':([(+s.pm>0?'PM'+s.pm:''),(+s.cd>0?'CD'+s.cd:''),(s.recargaEsp?'Rec':'')].filter(Boolean).join('·')||'livre');
    return `<div class="skrow"><span class="nm" style="border-left:3px solid ${cor}">${escapeHTML(s.name)}</span><span class="rk">R${s.rank||1} · ${cost}</span></div>`;
  }).join('')+'</div>';
}
const SLOTLABEL={maoE:'Mão Esq.',maoD:'Mão Dir.',cabeca:'Cabeça',camiseta:'Camiseta',armadura:'Armadura',roupabaixo:'R. Baixo',calca:'Calça',calcado:'Calçado',acc1:'Acess. 1',acc2:'Acess. 2',acc3:'Acess. 3',acc4:'Acess. 4',acc5:'Acess. 5'};
const SLOTORDER=['maoE','maoD','cabeca','camiseta','armadura','roupabaixo','calca','calcado','acc1','acc2','acc3','acc4','acc5'];
const FBKEY='dcc_fb_cfg', ROOMKEY='dcc_mestre_room';
let fbApp=null, fbDb=null, currentRef=null, gmRef=null;
let gmState={nivel:1,xp:0,xpAlvo:300,colapso:0};
const COL_PIPS=6;
const isqrt=x=>Math.floor(Math.sqrt(Math.max(0,x)));
function escapeHTML(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

function toggleCfg(){const b=document.getElementById('cfgbar');b.style.display=(b.style.display==='none'?'flex':'none');}
function parseCfg(raw){let s=raw.replace(/^\s*(const|var|let)\s+\w+\s*=\s*/,'').replace(/;\s*$/,'').trim();
  try{return JSON.parse(s);}catch(e){return (new Function('return ('+s+')'))();}}
function saveCfg(){
  const raw=document.getElementById('fbCfg').value.trim(); if(!raw){alert('Cole o firebaseConfig.');return;}
  try{localStorage.setItem(FBKEY,JSON.stringify(parseCfg(raw)));alert('Config salva. Digite o código da mesa e conecte.');toggleCfg();}
  catch(e){alert('Config inválida.');}
}
function setStatus(txt,live){document.getElementById('status').textContent=txt;document.getElementById('dot').classList.toggle('live',!!live);}
function connectCloud(){
  const room=document.getElementById('roomCode').value.trim(); if(!room){alert('Digite o código da mesa.');return;}
  const cfgRaw=localStorage.getItem(FBKEY); if(!cfgRaw){alert('Configure o Firebase primeiro (⚙).');toggleCfg();return;}
  try{
    const cfg=JSON.parse(cfgRaw);
    if(!fbApp){fbApp=firebase.initializeApp(cfg);} fbDb=firebase.database();
    localStorage.setItem(ROOMKEY,room);
    if(currentRef)currentRef.off();
    currentRef=fbDb.ref('mesas/'+room+'/jogadores');
    currentRef.on('value',snap=>{setStatus('ao vivo · mesa '+room,true);render(snap.val()||{});},
      err=>{setStatus('erro: '+err.message,false);});
    if(gmRef)gmRef.off();
    gmRef=fbDb.ref('mesas/'+room+'/mestre');
    gmRef.on('value',snap=>renderGm(snap.val()));
  }catch(e){setStatus('erro de conexão',false);alert('Falha: '+e.message);}
}
/* ---------- trackers do Mestre (XP + colapso), salvos em mesas/<sala>/mestre ---------- */
function renderGm(data){
  if(data){gmState=Object.assign({colapso:0},data);}
  const pc=document.getElementById('gmColapso');
  if(pc){let h='';for(let i=1;i<=COL_PIPS;i++){const on=(gmState.colapso||0)>=i;h+=`<div class="colpip ${on?'on':''}" title="Colapso ${i}/${COL_PIPS}" onclick="setColapso(${(gmState.colapso||0)===i?i-1:i})"></div>`;}pc.innerHTML=h;}
}
function pushGm(){ if(gmRef)gmRef.set(gmState); }
function setColapso(n){ gmState.colapso=Math.max(0,Math.min(COL_PIPS,n)); renderGm(); pushGm(); }

function cardStats(c){
  const dmg=(c.d1||c.d2||c.d3)?`<span class="dmg">${c.d1||0}/${c.d2||0}/${c.d3||0}</span>${c.attr?' ['+c.attr+']':''} `:'';
  const prec=c.prec?`P+${c.prec} `:'';
  const def=c.def?`<span class="def">D+${c.def}</span>`:'';
  return dmg+prec+def;
}
const BOXES=[['bronze','Bronze','#cd7f32'],['prata','Prata','#c4cdd6'],['ouro','Ouro','#ffcf3f'],['platina','Platina','#8fe0ff'],['lendaria','Lendária','#ff8a2a'],['divina','Divina','#ffffff']];
function invHTML(inv){
  if(!inv||!inv.length)return '';
  const itens=inv.map(it=>{
    const cor=RAR[it.rar]||RAR.comum; const q=it.qty||1;
    return `<span class="invtag" style="border-left-color:${cor}">${escapeHTML(it.name||'?')}${q>1?' ×'+q:''}</span>`;
  }).join('');
  const totQ=inv.reduce((a,b)=>a+(b.qty||1),0);
  return `<div class="eq-title" style="margin-top:10px">Inventário (${totQ})</div><div class="invtags">${itens}</div>`;
}
function resHTML(p,psLivre){
  const boxes=BOXES.filter(([k])=>p.boxes&&p.boxes[k]>0)
    .map(([k,nome,cor])=>`<span class="boxtag" style="border-color:${cor};color:${cor}">${nome} ×${p.boxes[k]}</span>`).join('');
  const gold=`<span class="goldtag">🪙 ${p.gold||0}</span>`;
  const paT=`<span class="patag" title="Audiência acumulada (só sobe)">📣 ${p.pa||0} PA</span>`;
  const ps=`<span class="pstag">✨ ${psLivre||0} PS</span>`;
  return `<div class="restline">${gold}${paT}${ps}${boxes}</div>`;
}
function companHTML(cs){
  if(!cs||!cs.length)return '';
  const rows=cs.map(c=>{
    const hp=(c.hp!=null?c.hp:'?'), hpm=(c.hpMax!=null?c.hpMax:'?');
    return `<div class="compan-row"><span class="cnm">${escapeHTML(c.name||'(companheiro)')}</span><span class="chpc">❤ ${hp}/${hpm}</span>${c.note?`<span class="cnt">${escapeHTML(c.note)}</span>`:''}</div>`;
  }).join('');
  return `<div class="eq-title" style="margin-top:10px">Companheiros (${cs.length})</div><div class="compan-wrap">${rows}</div>`;
}
function render(data){
  lastData=data||{};
  const wrap=document.getElementById('players');
  const ids=Object.keys(data);
  if(!ids.length){wrap.innerHTML='<div class="nobody">Ninguém conectado ainda nesta mesa.</div>';return;}
  // ordena por nome
  ids.sort((a,b)=>(data[a].name||'').localeCompare(data[b].name||''));
  const now=Date.now();
  wrap.innerHTML=ids.map(id=>{
    const p=data[id]; const at=p.attr||{FOR:1,DEX:1,CON:1,INT:1,CHA:1}; const cards=p.cards||{};
    let defBonus=0;Object.values(cards).forEach(c=>defBonus+=(+c.def||0));
    const hpMax=(p.hpMax!=null?p.hpMax:8+(at.CON||1)*3), manaMax=(p.pmMax!=null?p.pmMax:(at.INT||1)*3), def=isqrt(at.DEX||1)+defBonus, ini=isqrt(at.DEX||1);
    const hpCur=(p.hpCur!=null?p.hpCur:hpMax);
    const pmCur=(p.pmCur!=null?p.pmCur:manaMax);
    const hpLow=hpCur<=hpMax*0.34;
    const u=unarmedCalc(at,cards);
    const psLivre=(p.psTotal||0)-psSpentCalc(p.skills);
    const stale=(now-(p.updatedAt||0))>120000; // sem update há 2 min
    const eq=SLOTORDER.filter(s=>cards[s]).map(s=>{
      const c=cards[s]; const cor=RAR[c.rar]||RAR.comum;
      return `<div class="eq" style="border-left-color:${cor}">
        <div class="slot">${SLOTLABEL[s]}</div>
        <div class="nm">${escapeHTML(c.name||'')}</div>
        <div class="st">${cardStats(c)}${c.twoHand?' · 2 mãos':''}</div></div>`;
    }).join('') || '<div class="empty-eq">Nenhum item equipado.</div>';
    const upd=p.updatedAt?new Date(p.updatedAt).toLocaleTimeString('pt-BR'):'—';
    return `<div class="pcard ${stale?'stale':''}">
      <div class="phead"><div class="pname">${escapeHTML(p.name||'(sem nome)')}</div><div class="plvl">Nível ${p.level||1} · XP ${p.xp||0}</div></div>
      <div class="pattrs">
        ${['FOR','DEX','CON','INT','CHA'].map(k=>`<span class="pa">${k} <b>${at[k]||1}</b></span>`).join('')}
      </div>
      <div class="pstats">
        <div class="ps"><div class="k">HP</div><div class="v" style="color:${hpLow?'#ff4d4d':'#ff8a8a'}">${hpCur}/${hpMax}</div></div>
        <div class="ps"><div class="k">PM</div><div class="v" style="color:#7fb0ff">${pmCur}/${manaMax}</div></div>
        <div class="ps def"><div class="k">Defesa</div><div class="v">${def}</div></div>
        <div class="ps"><div class="k">Inic.</div><div class="v">+${ini}</div></div>
      </div>
      <div class="una">⚔ Desarmado <b>${u.b[0]} / ${u.b[1]} / ${u.b[2]}</b> [${u.reg}] · Prec +${u.prec} · ×${u.mult}</div>
      ${resHTML(p,psLivre)}
      <div class="eq-title">Equipamento</div>
      <div class="eqlist">${eq}</div>
      <div class="eq-title" style="margin-top:10px">Skills (${(p.skills||[]).length})</div>
      ${skillsHTML(p.skills)}
      ${companHTML(p.companions)}
      ${invHTML(p.inventory)}
      <div class="updated">atualizado ${upd}${stale?' (inativo)':''}</div>
    </div>`;
  }).join('');
}

function init(){
  renderGm();
  const room=localStorage.getItem(ROOMKEY); if(room)document.getElementById('roomCode').value=room;
  if(room&&localStorage.getItem(FBKEY))connectCloud();
}
init();
</script>
</body>
</html>
